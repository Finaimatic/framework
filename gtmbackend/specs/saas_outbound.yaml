# icp_spec.saas_outbound.yaml
#
# US B2B SaaS, founder/small-team, sales-assisted motion, ≤20 employees.
# Targets companies already doing (or clearly needing) cold outbound —
# Apollo/Clay/Smartlead/Instantly users who lack a real SDR/RevOps function.
# Pass to score_leads.py with --spec specs/icp_spec.saas_outbound.yaml


primary_signals:
  - B2B SaaS selling to businesses (not B2C, not pure PLG/self-serve)
  - Sales-assisted motion — "Book a demo" / "Talk to sales" CTA, not signup-only
  - ACV high enough to justify outbound (mid-market/enterprise deals)
  - Founder/owner-led GTM, small team (2-20), no dedicated SDR org
  - Recently funded (Pre-seed–Series A) — capital + pressure to grow pipeline
  - US-based (HQ or primary market)

secondary_signals:
  - Job posts mentioning Apollo, Clay, Outreach, Smartlead, Instantly, "SDR", "GTM"
  - Hiring growth / GTM / founding AE roles
  - Founder active on LinkedIn re: pipeline, outbound, GTM
  - Already runs a visible outbound motion (signal they value it — buyer, not blocker)
  - Clear, targetable ICP for their own product (campaignable)

hard_disqualifiers:        # any one caps fit_score at 2
  - Pure PLG / self-serve freemium, low ACV, no sales motion
  - B2C / consumer product
  - 50+ employees, or built-out SDR + RevOps + sales ops team
  - Not US-based
  - Agency / services / consultancy (not a software product)
  - Is itself an outbound/sales-tooling vendor (competitor, won't buy)

value_blockers:            # soft penalties — looks ICP but won't convert
  - Already retains an outbound / lead-gen / appointment-setting agency
  - Inbound-saturated (strong SEO/content engine, waitlist, "not taking demos")
  - Infra/dev-tool with diffuse ICP (hard to target campaigns)
  - Community / open-source-led GTM, no clear buyer

anchors:
  "10": Funded US B2B SaaS, founder-led, sales-led ACV, visible Apollo/Clay use, no SDR team
  "7-9": Clear US B2B SaaS, small, sales-assisted, outbound-fit, no real SDR function
  "4-6": SaaS signals but unclear ACV, motion, size, or US presence
  "1-3": B2C, PLG-only, agency, enterprise w/ full sales org, or competitor